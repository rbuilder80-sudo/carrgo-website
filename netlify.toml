[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force HTTPS and security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect www to non-www
[[redirects]]
  from = "https://www.carrgo.co.uk/*"
  to = "https://carrgo.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.carrgo.co.uk/*"
  to = "https://carrgo.co.uk/:splat"
  status = 301
  force = true

# Redirect netlify.app to custom domain
[[redirects]]
  from = "https://carrgo-uk-website.netlify.app/*"
  to = "https://carrgo.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://carrgo-uk-website.netlify.app/*"
  to = "https://carrgo.co.uk/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
