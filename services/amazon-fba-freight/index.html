<h2>What is Amazon FBA and why do sellers need a freight forwarder?</h2>
<p>Amazon FBA lets sellers store products in Amazon's warehouses. Amazon handles storage, packing, shipping, and customer service. However, getting your goods from your supplier to Amazon's fulfilment centres requires careful preparation, compliance, and logistics expertise. A freight forwarder like Carrgo handles the entire journey: collecting goods from your supplier, shipping them to the UK, preparing them for Amazon's strict requirements, and delivering them to the correct fulfilment centre.</p>
<h2>How does Carrgo's Amazon FBA prep process work?</h2>
<p>Our 6-step process: (1) Collection from supplier, (2) International shipping by sea/air/rail, (3) UK customs clearance, (4) FBA prep and inspection at our Midlands facility, (5) Carton and pallet preparation to Amazon specifications, (6) Delivery to Amazon FC with appointment booking.</p>
<h2>What are the most common FBA prep mistakes?</h2>
<p>Common mistakes include wrong FNSKU labels, overweight cartons (over 23kg), non-compliant pallets, missing suffocation warnings, incorrect shipment plans, and poor quality control. Carrgo prevents all of these through systematic pre-checking before delivery.</p>
<h2>Amazon FBA vs Standard Delivery</h2>
<p>Amazon FBA delivery requires compliance with Amazon's packaging, labelling, and pallet specifications. Standard delivery goes to your warehouse with fewer restrictions. Carrgo handles both options.</p>
<hr style="margin:30px 0;border:0;border-top:1px solid #e5e7eb">
<h2>Frequently Asked Questions</h2>
<p><strong>What FBA prep services do you offer?</strong> Our FBA prep services include product labelling (FNSKU), polybagging, bundling, carton forwarding, palletisation, and quality inspection. We ensure all shipments are 100% compliant with Amazon's requirements before delivery to any UK fulfilment centre.</p>
<p><strong>How much does shipping from China to Amazon FBA UK cost?</strong> Costs depend on product type, quantity, weight, and shipping mode. Sea freight from China to Amazon FBA UK typically ranges from £250–£450 per CBM all-inclusive. Air freight is £4.50–£8.00 per kg. Contact us for a precise all-inclusive quote.</p>
<p><strong>How long does it take to ship from China to Amazon FBA UK?</strong> Total transit times from China to Amazon FBA UK vary by mode: sea freight takes 35–45 days door-to-FC, air freight 7–12 days, and rail freight 20–28 days. These times include collection, transit, customs clearance, FBA prep, and delivery to the fulfilment centre.</p>
<p><strong>Do you handle Amazon FNSKU labelling?</strong> Yes, we provide full FNSKU labelling services. Simply send us your FNSKU barcode files and we'll print and apply labels to each unit, carton, or pallet according to Amazon's specifications. We also handle suffocation warning labels for polybagged items.</p>
<p><strong>Can you process Amazon FBA returns?</strong> Yes, we offer FBA returns management. We can receive returns at our Midlands facility, inspect products, repackage if resellable, and either return them to Amazon inventory or dispose of them according to your instructions.</p>
<p><strong>What happens if Amazon rejects my shipment?</strong> Amazon rejects shipments for incorrect labelling, overweight cartons, non-compliant pallets, or missing documentation. Carrgo prevents rejection by pre-checking every shipment against Amazon's requirements before delivery. If rejection still occurs, we handle remediation and re-delivery at no extra cost.</p>
<p><strong>Do you ship to all UK Amazon fulfilment centres?</strong> Yes, we deliver to all UK Amazon fulfilment centres including BHX4 (Coventry), EMA1 (Derby), LBA1 (Doncaster), MAN2 (Manchester), GLA1 (Gourock), and BRS1 (Bristol). We book appointments through Amazon's Carrier Central system and provide proof of delivery.</p>
<p><strong>Can you handle FBA shipments from the USA and Europe?</strong> Absolutely. We handle FBA shipments from the USA, China, India, Turkey, UAE, and all EU countries. Whether you need sea freight from the USA, air freight from China, or road freight from Germany, we manage the entire journey to Amazon UK.</p>
<p><strong>What is the minimum order quantity for FBA prep?</strong> We have no strict minimum order quantity. Whether you are shipping 50 units or 5,000 units, we can handle your FBA prep. For very small shipments, we may combine prep with other clients to keep costs efficient. Contact us for a tailored quote.</p>
<p><strong>How do I get started with Carrgo FBA services?</strong> Getting started is simple. Fill out our quote form with your product details, supplier location, and target Amazon FC. We will provide an all-inclusive quote within 2 hours. Once approved, we coordinate collection, shipping, customs, prep, and delivery — you only deal with one contact throughout.</p>
