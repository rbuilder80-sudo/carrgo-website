<h2>What is the India to UK trade lane?</h2>
<p>India is one of the UK's most significant trading partners with bilateral trade exceeding £25 billion annually. The deep historical ties, shared English-language business environment, and Commonwealth connection make India a natural sourcing destination for UK importers. Major Indian exports to the UK include textiles, pharmaceuticals, IT hardware, engineering goods, spices, and jewellery. Sea freight from Mumbai (JNPT), Chennai, or Mundra takes 20–30 days, while air freight from Mumbai or Delhi to UK takes 5–8 days. The UK and India are negotiating a Free Trade Agreement, but until ratified, the UK Global Tariff applies.</p>

<p style="margin:0;font-size:14px;color:#666">Mumbai (JNPT), Chennai, or Mundra to Felixstowe/London Gateway. 20–30 days port-to-port. Weekly sailings.</p>

<p style="margin:0;font-size:14px;color:#666">Shared container from major Indian ports. Best for 2–18 CBM. 25–35 days total including consolidation.</p>

<h2>What documents do I need to import from this route to UK?</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin:20px 0">
<div style="padding:16px;border:1px solid #e5e7eb;border-radius:8px">
<h3 style="margin:0 0 8px 0;font-size:16px">Commercial Invoice</h3>
<p style="margin:0;font-size:14px;color:#666">Must include full value in GBP or USD, detailed HS codes, and manufacturer details. For textiles, include fibre content percentages.</p>
</div>
<div style="padding:16px;border:1px solid #e5e7eb;border-radius:8px">
<h3 style="margin:0 0 8px 0;font-size:16px">Packing List</h3>
<p style="margin:0;font-size:14px;color:#666">Detailed carton-level list with weights, dimensions, and marks/numbers. Indian customs require this for export clearance.</p>
</div>
<div style="padding:16px;border:1px solid #e5e7eb;border-radius:8px">

<h2>What does the shipping process look like?</h2>
<img src="/images/india-to-uk-hero.jpg" alt="Shipping from India to UK - freight forwarding service" style="width:100%;max-width:800px;height:auto;border-radius:8px;margin:20px 0" />
<p>Our end-to-end freight forwarding service covers collection from your supplier, international shipping, UK customs clearance, and final delivery to your warehouse or Amazon fulfilment centre. Track every milestone through our online portal.</p>
<hr style="margin:30px 0;border:0;border-top:1px solid #e5e7eb">
<h2>Frequently Asked Questions</h2>
<p><strong>How long does sea freight from India to UK take?</strong> Sea freight from Mumbai (JNPT) or Chennai to UK ports takes 20–30 days port-to-port. Mundra on the west coast is slightly faster at 18–25 days. Air freight from Mumbai or Delhi to the UK takes 5–8 days door-to-door. Express courier can deliver in 3–5 days.</p>
<p><strong>What are the main Indian ports for shipping to UK?</strong> Mumbai's JNPT (Jawaharlal Nehru Port) is India's largest container port and primary gateway for UK-bound cargo. Chennai handles southern and eastern Indian exports. Mundra in Gujarat is a fast-growing private port. We offer services from all major Indian ports with weekly sailings.</p>
<p><strong>How much does shipping a container from India to UK cost?</strong> Sea freight FCL from Mumbai or Chennai to UK costs £1,200–£3,500 per container depending on the season and port. Air freight costs £3.50–£7.00 per kg. LCL is £85–£160 per CBM. Express courier for small urgent shipments is £6.00–£12.00 per kg.</p>
<p><strong>Do I need an EORI number to import from India to UK?</strong> Yes, a UK EORI number is mandatory for all commercial imports from India. Carrgo can guide you through the HMRC application process. It typically takes 3–5 working days to receive. There is no current UK-India FTA, so standard UK Global Tariff rates apply.</p>
<p><strong>Is there a UK-India Free Trade Agreement?</strong> The UK and India are negotiating a comprehensive Free Trade Agreement, but it has not yet been ratified. Until then, standard UK Global Tariff rates apply to Indian imports. Our customs team can advise on the exact duty rates for your HS commodity codes.</p>
<p><strong>What is the cheapest way to ship from India to UK?</strong> Sea freight FCL is the cheapest option for large volumes, with containers from Mumbai costing £1,200–£2,500. For smaller shipments, LCL at £85–£160 per CBM is cost-effective. Air freight is fastest but costs £3.50–£7.00 per kg. Rail is not available on this route.</p>
<p><strong>Can Carrgo collect goods from anywhere in India?</strong> Yes, we collect from Mumbai, Delhi, Chennai, Bangalore, Hyderabad, Ahmedabad, Pune, and all major Indian cities. Our Indian agent network handles inland haulage, export customs clearance, and port stuffing.</p>
<p><strong>What documents are needed for India to UK customs?</strong> Commercial Invoice, Packing List, Bill of Lading or Airway Bill, UK EORI Number, and Certificate of Origin. BIS certification may be needed for electronics, FSSAI for food, and drug licences for pharmaceuticals. Carrgo handles all documentation.</p>
<p><strong>What are the most common goods shipped from India to UK?</strong> Textiles and garments, pharmaceuticals and generic medicines, IT hardware and electronics, engineering goods, spices and food products, and jewellery. Carrgo has extensive experience with Indian exports including temperature-controlled pharmaceutical shipments.</p>
<p><strong>How do I get a freight quote from India to UK?</strong> Fill out our quote form with your Indian origin city, cargo details, weight, dimensions, and preferred transport mode. We provide an all-inclusive quote within 2 hours covering collection, freight, customs, and UK delivery.</p>
