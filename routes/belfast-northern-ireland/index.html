<h2>What makes Northern Ireland's trade position unique?</h2>
<p>Northern Ireland has a unique trade position under the Windsor Framework. Goods moving from GB to NI use the green lane with minimal checks. Goods at risk of entering the EU use the red lane with full customs. Carrgo specialises in both pathways.</p>
<h2>How much does shipping to Northern Ireland cost?</h2>
<p>Sea freight RoRo: £400–£800 per trailer. Road freight: £200–£500 per pallet. Air freight: £2.50–£4.50 per kg. LCL: £60–£110 per CBM. Carrgo provides all-inclusive quotes covering customs and Protocol compliance.</p>
<h2>What documents are needed for Northern Ireland shipments?</h2>
<p>Required: Commercial Invoice, Packing List, Bill of Lading/CMR, UK EORI (XI prefix for NI), T2 Transit Document (for at-risk goods), and UKIMS Authorisation (for not-at-risk goods). Carrgo handles all NI Protocol documentation.</p>
