<h2>What is the USA to UK trade lane?</h2>
<p>The United States is the UK's largest single trading partner, with bilateral trade exceeding £260 billion annually. This well-established route benefits from frequent sailings, extensive flight networks, and streamlined customs procedures.</p>
<h2>How much does shipping from USA to UK cost?</h2>
<p>East Coast to UK FCL: £1,200–£3,000. West Coast to UK FCL: £1,800–£4,000. Air freight express: £4.50–£7.50/kg. Air freight economy: £3.00–£5.00/kg. LCL sea freight: £150–£300 per CBM. Carrgo provides all-inclusive quotes.</p>
<h2>What documents do I need to import from USA to UK?</h2>
<p>Required documents: Commercial Invoice, Packing List, Bill of Lading or Airway Bill, UK EORI Number, Certificate of Origin (for preferential claims), and Import Licence (for restricted goods). Carrgo handles all customs documentation.</p>
<hr style="margin:30px 0;border:0;border-top:1px solid #e5e7eb">
<h2>Frequently Asked Questions</h2>
<p><strong>How long does sea freight from the USA to UK take?</strong> Sea freight from the US East Coast (New York, Savannah) to the UK takes 10–15 days port-to-port. From the US West Coast (Los Angeles, Long Beach) via the Panama Canal, expect 25–30 days. Air freight from any major US airport to the UK takes 1–3 days.</p>
<p><strong>What are the main US ports for shipping to the UK?</strong> From the East Coast: New York/New Jersey, Savannah, Charleston, Norfolk, and Miami are the primary ports. From the West Coast: Los Angeles, Long Beach, Oakland, and Seattle. We also offer services from Gulf Coast ports including Houston and New Orleans.</p>
<p><strong>How much does shipping a container from USA to UK cost?</strong> East Coast to UK FCL containers typically cost £1,200–£3,000 depending on the season. West Coast to UK ranges from £1,800–£4,000. Air freight costs £3–£6 per kilogram. LCL is charged per cubic metre. Contact us for an all-inclusive quote.</p>
<p><strong>Do I need an EORI number to import from the USA to UK?</strong> Yes, a UK EORI number is mandatory for all commercial imports into the UK from the USA. If you don't have one, we can guide you through the application process with HMRC. It typically takes 3–5 working days to receive your EORI number.</p>
<p><strong>Are there any trade agreements between the USA and UK?</strong> Currently there is no comprehensive free trade agreement between the USA and UK. Standard UK import tariffs (known as the UK Global Tariff) apply to US goods. Our customs team can help you determine the exact duty rates for your specific HS commodity codes.</p>
<p><strong>What is the cheapest way to ship from USA to UK?</strong> Sea freight from the US East Coast is the cheapest option for large volumes, with FCL containers costing £1,200–£3,000. For smaller shipments, LCL sea freight at £150–£300 per CBM is cost-effective. Air freight is fastest but costs £3–£6 per kg. Rail is not available on the transatlantic route.</p>
<p><strong>Can I ship Amazon FBA goods from USA to UK?</strong> Yes, Carrgo handles Amazon FBA shipments from the USA to UK fulfilment centres including BHX4, EMA1, and LBA1. We manage FBA prep, labelling, palletisation, and appointment booking through Amazon Carrier Central. Full customs clearance included.</p>
<p><strong>Do you ship from USA to Northern Ireland and Ireland?</strong> Yes. USA goods can be shipped to Northern Ireland via Belfast or Larne, and to the Republic of Ireland via Dublin or Cork. We handle all customs requirements including the NI Protocol and Irish customs declarations.</p>
<p><strong>What is the best Incoterm for USA to UK shipping?</strong> DDP (Delivered Duty Paid) is best for most UK importers as the seller handles all costs and customs. FOB (Free on Board) is common for sea freight — the seller delivers to the US port, and you handle freight and UK customs. Carrgo can advise based on your supplier agreement.</p>
<p><strong>How do I get a freight quote from USA to UK?</strong> Fill out our online quote form with your US origin city, cargo details, weight, dimensions, and preferred transport mode. We provide an all-inclusive quote within 2 hours covering collection, freight, customs, and UK delivery.</p>
